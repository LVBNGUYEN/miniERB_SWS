version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: minierp_postgres
    restart: always
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: minierp_db
    ports:
      - '5433:5432'
    volumes:
      - minierp_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: minierp_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - minierp_redis_data:/data

volumes:
  minierp_db_data:
  minierp_redis_data:
